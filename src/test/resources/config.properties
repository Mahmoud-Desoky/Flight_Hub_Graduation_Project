# ============================================
# FlightHub Automation Framework Configuration
# ============================================

# Application Settings
base.url=https://www.flighthub.com

# Browser Configuration
# Options: chrome, firefox, edge, safari
browser=chrome

# Headless Mode (true/false)
# Set to true for CI/CD environments
headless=false

# Execution Mode
# Options: local, grid
execution.mode=local

# Selenium Grid Hub URL
hub.url=http://localhost:4444/wd/hub

# Grid Platform
# Options: LINUX, WINDOWS, MAC, ANY
grid.platform=LINUX

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=15
page.load.timeout=30
script.timeout=10

# Screenshot Configuration
screenshots.enabled=true
screenshot.path=screenshots/

# Retry Configuration
retry.attempts=1

# Test Data
# Default test user credentials (for pre-registered user tests)
default.email=test.user@example.com
default.password=TestPassword123!
